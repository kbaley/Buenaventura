name: Build and deploy Buenaventura MCP

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "Buenaventura.MCP/**"
      - "Buenaventura.Domain/**"
      - "Buenaventura.Shared/**"
      - "Directory.Packages.props"
      - ".github/workflows/azure-mcp.yml"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish MCP server
        run: dotnet publish Buenaventura.MCP/Buenaventura.MCP.csproj --configuration Release --output publish

      - uses: actions/upload-artifact@v4
        with:
          name: buenaventura-mcp
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: MCP
      url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: buenaventura-mcp
          path: publish

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_MCP_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_MCP_PUBLISH_PROFILE }}
          package: publish
